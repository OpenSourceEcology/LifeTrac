# 99_release_and_reset.cfg
#
# Cleanup script: release writes (no-op since BSRR is one-shot), resume target,
# and shut openocd down. Note that this does NOT restore x8h7 bridge state —
# the bridge will still be stalled until a power cycle. Recommended cleanup
# sequence after a successful flash:
#   1. Source this script (or just ^C the openocd holding 02_assert_pg7_pc7).
#   2. Power-cycle the board (unplug USB-C + 12V barrel >= 10s).

resume
shutdown
