# 01_halted_dump.cfg
#
# Sourced AFTER /usr/arduino/extra/openocd_script-imx_gpio.cfg, which ends
# with `init; targets; reset halt`. By the time we run, M7 is halted in the
# System Bootloader at PC ~ 0x1ff09abc.
#
# This script dumps every GPIO bank's clock-enable bit, MODER, and IDR.
# Zero side effects — no writes. Use this to learn the pre-poke state and to
# confirm which banks are clocked / which pins are outputs vs. inputs.
#
# Address constants per RM0399 (STM32H747XI):
#   RCC_AHB4ENR = 0x580244E0
#   GPIOA base  = 0x58020000  (stride 0x400)
#     +0x00 MODER   (R/W, 2 bits per pin)
#     +0x10 IDR     (RO,   1 bit per pin)
#     +0x18 BSRR    (WO,   1 bit per pin set, +16 reset)

# Portable 32-bit memory read. Wraps mem2array which all openocd builds carry.
proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}

proc dump_gpio_banks {} {
    set ahb4 [memread32 0x580244E0]
    echo [format "RCC_AHB4ENR = 0x%08x" $ahb4]
    echo "  GPIOA en = [expr {($ahb4 >> 0) & 1}]   GPIOB en = [expr {($ahb4 >> 1) & 1}]"
    echo "  GPIOC en = [expr {($ahb4 >> 2) & 1}]   GPIOD en = [expr {($ahb4 >> 3) & 1}]"
    echo "  GPIOE en = [expr {($ahb4 >> 4) & 1}]   GPIOF en = [expr {($ahb4 >> 5) & 1}]"
    echo "  GPIOG en = [expr {($ahb4 >> 6) & 1}]   GPIOH en = [expr {($ahb4 >> 7) & 1}]"
    echo "  GPIOI en = [expr {($ahb4 >> 8) & 1}]   GPIOJ en = [expr {($ahb4 >> 9) & 1}]"
    echo "  GPIOK en = [expr {($ahb4 >> 10) & 1}]"
    echo ""

    set names {A B C D E F G H I J K}
    for {set i 0} {$i < 11} {incr i} {
        set base [expr {0x58020000 + ($i * 0x400)}]
        set en   [expr {($ahb4 >> $i) & 1}]
        set name [lindex $names $i]
        if {$en == 0} {
            echo [format "GPIO%s @ 0x%08x  (clock OFF, skip)" $name $base]
            continue
        }
        set moder [memread32 [expr {$base + 0x00}]]
        set idr   [memread32 [expr {$base + 0x10}]]
        echo [format "GPIO%s @ 0x%08x  MODER=0x%08x  IDR=0x%04x" \
              $name $base $moder [expr {$idr & 0xffff}]]
        # Per-pin breakdown for outputs only.
        for {set p 0} {$p < 16} {incr p} {
            set m [expr {($moder >> ($p * 2)) & 0x3}]
            if {$m == 1} {
                set v [expr {($idr >> $p) & 1}]
                echo [format "    P%s_%d = OUTPUT, level=%d" $name $p $v]
            }
        }
    }
}

dump_gpio_banks
echo "---"
echo "halted-dump complete; leaving target halted."
echo "issue 'shutdown' or hit Ctrl-C to exit openocd."
