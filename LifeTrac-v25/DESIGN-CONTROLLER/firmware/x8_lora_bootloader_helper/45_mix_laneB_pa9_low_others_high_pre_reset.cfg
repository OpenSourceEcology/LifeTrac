# Mixed-state lane-B case 6:
# PA9=LOW, PA10/PB10/PB11/PC9=HIGH, asserted BEFORE NRST release.

init
halt

set GPIOA_BASE 0x58020000
set GPIOB_BASE 0x58020400
set GPIOC_BASE 0x58020800
set GPIOF_BASE 0x58021400

proc memread32 {addr} { array unset _r32; mem2array _r32 32 $addr 1; return $_r32(0) }
proc rmw32 {addr mask val} { set cur [memread32 $addr]; set new [expr {($cur & ~$mask) | ($val & $mask)}]; mww $addr $new }
proc moder_set_output {base pin} { set mask [expr {0x3 << ($pin * 2)}]; set val [expr {0x1 << ($pin * 2)}]; rmw32 [expr {$base + 0x00}] $mask $val }
proc bsrr_set {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }
proc idr_bit {base pin} { set idr [memread32 [expr {$base + 0x10}]]; return [expr {($idr >> $pin) & 1}] }

set RCC 0x580244E0
rmw32 $RCC 0x000007ff 0x000007ff

foreach pair {{0x58020000 9} {0x58020000 10} {0x58020400 10} {0x58020400 11} {0x58020800 9}} {
    set base [lindex $pair 0]
    set pin  [lindex $pair 1]
    moder_set_output $base $pin
    bsrr_set $base $pin
}
bsrr_reset $GPIOA_BASE 9

moder_set_output $GPIOA_BASE 11
bsrr_reset $GPIOA_BASE 11
moder_set_output $GPIOF_BASE 4
bsrr_reset $GPIOF_BASE 4
sleep 250
bsrr_set $GPIOF_BASE 4

echo "  IDR base=0x58020000 pin=9 val=[idr_bit $GPIOA_BASE 9]"
echo "  IDR base=0x58020000 pin=10 val=[idr_bit $GPIOA_BASE 10]"
echo "  IDR base=0x58020400 pin=10 val=[idr_bit $GPIOB_BASE 10]"
echo "  IDR base=0x58020400 pin=11 val=[idr_bit $GPIOB_BASE 11]"
echo "  IDR base=0x58020800 pin=9 val=[idr_bit $GPIOC_BASE 9]"

resume
shutdown
