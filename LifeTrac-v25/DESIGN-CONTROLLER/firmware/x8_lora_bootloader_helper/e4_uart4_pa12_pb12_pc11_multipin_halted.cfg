init
halt

# ============================================================================
# GPIO Bank Base Addresses (STM32H747 RM0399 §8)
# ============================================================================
set GPIOA_BASE 0x58020000
set GPIOB_BASE 0x58020400
set GPIOC_BASE 0x58020800
set GPIOD_BASE 0x58020C00
set GPIOE_BASE 0x58021000
set GPIOF_BASE 0x58021400
set GPIOG_BASE 0x58021800
set GPIOH_BASE 0x58021C00
set GPIOI_BASE 0x58022000

set RCC 0x58024400

# ============================================================================
# Helper Procs
# ============================================================================
proc memread32 {base offset} {
    return [read_memory [expr {$base + $offset}] 32]
}

proc rmw32 {base offset mask value} {
    set addr [expr {$base + $offset}]
    set current [read_memory $addr 32]
    set newval [expr {($current & ~$mask) | ($value & $mask)}]
    write_memory $addr 32 $newval
}

proc moder_set_output {bank_base pin} {
    set moder_offset 0x00
    set pin_pos [expr {$pin * 2}]
    set mask [expr {0x3 << $pin_pos}]
    set value [expr {0x1 << $pin_pos}]
    rmw32 $bank_base $moder_offset $mask $value
}

proc moder_set_analog {bank_base pin} {
    set moder_offset 0x00
    set pin_pos [expr {$pin * 2}]
    set mask [expr {0x3 << $pin_pos}]
    set value [expr {0x3 << $pin_pos}]
    rmw32 $bank_base $moder_offset $mask $value
}

proc bsrr_set {bank_base pin} {
    set bsrr_offset 0x18
    set value [expr {1 << $pin}]
    write_memory [expr {$bank_base + $bsrr_offset}] 32 $value
}

proc bsrr_reset {bank_base pin} {
    set bsrr_offset 0x18
    set value [expr {1 << ($pin + 16)}]
    write_memory [expr {$bank_base + $bsrr_offset}] 32 $value
}

# ============================================================================
# RCC Setup: Enable all GPIO clocks
# ============================================================================
rmw32 $RCC 0x000007ff 0x000007ff

# ============================================================================
# Baseline Configuration (per test framework requirement)
# ============================================================================
# PA9/PA10 = ANALOG (UART fallback, set to no-drive)
moder_set_analog $GPIOA_BASE 9
moder_set_analog $GPIOA_BASE 10

# PA11 = OUTPUT LOW (BOOT0 user-app state)
moder_set_output $GPIOA_BASE 11
bsrr_reset $GPIOA_BASE 11

# ============================================================================
# NRST Pulse Sequence: PF4 (active low, 250ms hold)
# ============================================================================
# Release NRST (HIGH) - let it float to pull-up or externally stable
bsrr_set $GPIOF_BASE 4
sleep 100

# Assert NRST (LOW) for 250ms
bsrr_reset $GPIOF_BASE 4
sleep 250

# Release NRST (HIGH)
bsrr_set $GPIOF_BASE 4
sleep 100

# ============================================================================
# PHASE E-1 TEST CASE: Multi-Pin Simultaneous (PA12 + PB12 + PC11)
# ============================================================================
# Set PA12, PB12, PC11 all to OUTPUT mode
moder_set_output $GPIOA_BASE 12
moder_set_output $GPIOB_BASE 12
moder_set_output $GPIOC_BASE 11

# Drive all three pins HIGH simultaneously (comprehensive mux/shifter/buffer activation)
bsrr_set $GPIOA_BASE 12
bsrr_set $GPIOB_BASE 12
bsrr_set $GPIOC_BASE 11

sleep 100
