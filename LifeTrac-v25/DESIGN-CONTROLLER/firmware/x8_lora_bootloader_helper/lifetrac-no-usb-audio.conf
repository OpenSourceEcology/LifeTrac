# LifeTrac W2-01: prevent snd-usb-audio from binding to USB audio interfaces.
#
# The Kurokesu C2 (16d0:0ed4) is a composite UVC + UAC device. We only need
# the UVC video interfaces. snd-usb-audio binding to the audio interface
# adds isochronous bandwidth pressure and an extra alt-setting negotiation
# during the same enumeration window where we have observed the X8
# `ci_hdrc-imx` host controller wedge.
#
# The benign `cannot get freq at ep 0x84` printk we saw on Board 1 was from
# this driver, not uvcvideo (kernel.org bug #212771).
#
# LifeTrac does not currently use any USB audio device on the X8, so a
# blanket blacklist is the simplest robust answer. If you ever attach a USB
# audio device to the X8, replace this with a targeted unbind handled by
# the W2-01 guard script (`w2_01_camera_usb_guard.sh`) or a per-interface
# udev rule.
#
# Install on the target:
#   sudo cp lifetrac-no-usb-audio.conf /etc/modprobe.d/
#   sudo rmmod snd_usb_audio 2>/dev/null || true
#   sudo update-initramfs -u 2>/dev/null || true
#
# Verify:
#   lsmod | grep snd_usb_audio   # expect no output
#   ls /sys/bus/usb/drivers/snd-usb-audio 2>&1 | head   # expect "No such file"
install snd_usb_audio /bin/false
