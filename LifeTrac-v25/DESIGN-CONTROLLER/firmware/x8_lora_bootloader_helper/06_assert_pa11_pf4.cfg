# 06_assert_pa11_pf4.cfg — BOOT0=PA_11 (PWM4), NRST=PF_4 (GPIO3).
#
# Phase A: enable GPIOA + GPIOF clocks (RCC_AHB4ENR bits 0 and 5).
# Phase B: drive PA_11 HIGH (LoRa BOOT0).
# Phase C: pulse PF_4 LOW(250ms) then HIGH (LoRa NRST).
# Phase D: re-assert PA_11 HIGH, hold 60s.

set GPIOA_BASE 0x58020000
set GPIOF_BASE 0x58021400

proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}
proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
}
proc moder_set_output {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    set val  [expr {0x1 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask $val
}
proc bsrr_set   {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }
proc idr_bit {base pin} {
    set idr [memread32 [expr {$base + 0x10}]]
    return [expr {($idr >> $pin) & 1}]
}

echo "Phase A: enable GPIOA + GPIOF clocks (bits 0 + 5)"
set RCC 0x580244E0
echo "  RCC_AHB4ENR before = [format 0x%08x [memread32 $RCC]]"
rmw32 $RCC [expr {(1 << 0) | (1 << 5)}] [expr {(1 << 0) | (1 << 5)}]
echo "  RCC_AHB4ENR after  = [format 0x%08x [memread32 $RCC]]"

echo "Phase B: drive PA_11 HIGH (LoRa BOOT0)"
moder_set_output $GPIOA_BASE 11
bsrr_set $GPIOA_BASE 11
echo "  GPIOA_IDR.PA_11 = [idr_bit $GPIOA_BASE 11]   (expect 1)"

echo "Phase C: pulse PF_4 LOW(250ms) then HIGH (LoRa NRST)"
moder_set_output $GPIOF_BASE 4
bsrr_reset $GPIOF_BASE 4
echo "  GPIOF_IDR.PF_4 (low)  = [idr_bit $GPIOF_BASE 4]   (expect 0)"
sleep 250
bsrr_set $GPIOF_BASE 4
sleep 200
echo "  GPIOF_IDR.PF_4 (high) = [idr_bit $GPIOF_BASE 4]   (expect 1)"

echo "Phase D: re-assert PA_11 HIGH"
bsrr_set $GPIOA_BASE 11
echo "  GPIOA_IDR.PA_11 (post-reset) = [idr_bit $GPIOA_BASE 11]   (expect 1)"

echo ""
echo "READY: L072 should be in STM32 ROM bootloader on /dev/ttymxc3 @ 19200 8E1."
echo "Holding halted for 60s with PA_11=HIGH (re-asserted every 1s)."

for {set i 0} {$i < 60} {incr i} {
    sleep 1000
    bsrr_set $GPIOA_BASE 11
}

echo "Releasing target."
resume
shutdown
