# 60_snapshot_passive_state.cfg
# One-shot passive snapshot: halt, dump GPIO clock/MODER/IDR, shutdown.

init
halt

proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}

proc dump_gpio_banks {} {
    set ahb4 [memread32 0x580244E0]
    echo [format "RCC_AHB4ENR = 0x%08x" $ahb4]
    set names {A B C D E F G H I J K}
    for {set i 0} {$i < 11} {incr i} {
        set base [expr {0x58020000 + ($i * 0x400)}]
        set en   [expr {($ahb4 >> $i) & 1}]
        set name [lindex $names $i]
        if {$en == 0} {
            echo [format "GPIO%s @ 0x%08x (clock OFF)" $name $base]
            continue
        }
        set moder [memread32 [expr {$base + 0x00}]]
        set idr   [memread32 [expr {$base + 0x10}]]
        echo [format "GPIO%s @ 0x%08x MODER=0x%08x IDR=0x%04x" $name $base $moder [expr {$idr & 0xffff}]]
    }
}

dump_gpio_banks
shutdown
