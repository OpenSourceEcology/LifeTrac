# Targeted cfg 70:
# Purpose: Test if PA9=ANALOG (high-impedance) removes H7 UART1_TX bus contention
#          on the i.MX8 UART4_TX → Murata RX path.
#
# DTS evidence (ov_carrier_enuc_lora.dts): UART4 TX/RX, no RTS/CTS, no mux-select GPIO.
# H7 PA9 = UART1_TX is physically routed to Murata CMWX RX via carrier level converter.
# Setting PA9 to ANALOG (MODER=11) makes it high-impedance, removing H7 from that line.
#
# Control set for i.MX8→Murata RX: PA9=ANALOG, PA10=ANALOG (high-impedance, not driving)
# Lane B/C set kept HIGH for Murata TX → i.MX8 RX path (proven by hold-window experiments):
#   PC10=HIGH, PB11=HIGH, PC9=HIGH
# PA11=LOW (same as all prior cfgs, PA11=HIGH to be tested separately in cfg71)
# PF4 = Murata NRST pulse (250ms LOW → HIGH)
#
# Expected outcome if hypothesis is correct: VER_URC received.

init
halt

set GPIOA_BASE 0x58020000
set GPIOB_BASE 0x58020400
set GPIOC_BASE 0x58020800
set GPIOE_BASE 0x58021000
set GPIOF_BASE 0x58021400

proc memread32 {addr} { array unset _r32; mem2array _r32 32 $addr 1; return $_r32(0) }
proc rmw32 {addr mask val} { set cur [memread32 $addr]; set new [expr {($cur & ~$mask) | ($val & $mask)}]; mww $addr $new }
proc moder_set_output {base pin} { set mask [expr {0x3 << ($pin * 2)}]; set val [expr {0x1 << ($pin * 2)}]; rmw32 [expr {$base + 0x00}] $mask $val }
proc moder_set_analog {base pin} { set mask [expr {0x3 << ($pin * 2)}]; set val [expr {0x3 << ($pin * 2)}]; rmw32 [expr {$base + 0x00}] $mask $val }
proc bsrr_set {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }
proc idr_bit {base pin} { set idr [memread32 [expr {$base + 0x10}]]; return [expr {($idr >> $pin) & 1}] }

set RCC 0x580244E0
rmw32 $RCC 0x000007ff 0x000007ff

# Force lane B/C pins LOW first (full baseline)
foreach pair {{0x58020400 11} {0x58020800 9} {0x58020800 10} {0x58020800 11} {0x58020800 12} {0x58021000 11} {0x58021000 12}} {
    set base [lindex $pair 0]
    set pin  [lindex $pair 1]
    moder_set_output $base $pin
    bsrr_reset $base $pin
}

# KEY: Set PA9 and PA10 to ANALOG (high-impedance) — removes H7 from Murata TX/RX lines
moder_set_analog $GPIOA_BASE 9
moder_set_analog $GPIOA_BASE 10

# Lane B/C HIGH to keep i.MX8←Murata TX path open (proven working by hold-window experiments)
bsrr_set $GPIOC_BASE 10
bsrr_set $GPIOB_BASE 11
bsrr_set $GPIOC_BASE 9

# PA11=LOW (consistent with all prior cfgs; DIR/flow-ctrl pin)
moder_set_output $GPIOA_BASE 11
bsrr_reset $GPIOA_BASE 11

# PF4 = Murata NRST: assert LOW for 250ms then release (active-low reset)
moder_set_output $GPIOF_BASE 4
bsrr_reset $GPIOF_BASE 4
sleep 250
bsrr_set $GPIOF_BASE 4

# IDR readback for evidence
set a9  [idr_bit $GPIOA_BASE 9]
set a10 [idr_bit $GPIOA_BASE 10]
set a11 [idr_bit $GPIOA_BASE 11]
set b11 [idr_bit $GPIOB_BASE 11]
set c9  [idr_bit $GPIOC_BASE 9]
set c10 [idr_bit $GPIOC_BASE 10]
set f4  [idr_bit $GPIOF_BASE 4]

echo "  IDR A9=$a9(ANALOG) A10=$a10(ANALOG) A11=$a11"
echo "  IDR B11=$b11 C9=$c9 C10=$c10"
echo "  IDR F4=$f4 (1=released)"

resume
shutdown
