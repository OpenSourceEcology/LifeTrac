# 13_perturb_pe11_low.cfg
#
# Phase 3 single-pin perturbation:
# 1) boot L072 user app (PA_11 low + PF_4 reset pulse)
# 2) allow user runtime configuration
# 3) halt H7 and force PE_11 low
# 4) resume and shutdown, then host runs diag + stage1 probe

init
halt

set GPIOA_BASE 0x58020000
set GPIOE_BASE 0x58021000
set GPIOF_BASE 0x58021400

proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}

proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
}

proc moder_set_output {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    set val  [expr {0x1 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask $val
}

proc bsrr_set {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }
proc idr_bit {base pin} {
    set idr [memread32 [expr {$base + 0x10}]]
    return [expr {($idr >> $pin) & 1}]
}

echo "Phase A: enable all GPIO bank clocks"
set RCC 0x580244E0
rmw32 $RCC 0x000007ff 0x000007ff

echo "Phase B: boot user app (PA_11 low + PF_4 reset pulse)"
moder_set_output $GPIOA_BASE 11
bsrr_reset $GPIOA_BASE 11
moder_set_output $GPIOF_BASE 4
bsrr_reset $GPIOF_BASE 4
sleep 250
bsrr_set $GPIOF_BASE 4

echo "Phase C: run to allow firmware pin ownership"
resume
sleep 1200
halt

echo "Phase D: force PE_11 low"
moder_set_output $GPIOE_BASE 11
bsrr_reset $GPIOE_BASE 11
echo "  GPIOE_IDR.PE_11 = [idr_bit $GPIOE_BASE 11]"

echo "Phase E: release"
resume
shutdown
