# Phase 7 live intervention C:
# Keep target running and repeatedly enforce lane-C AF policy in a live loop.
# Lane C: PC10(AF6), PC11(AF6), PC12(AF6), PC9(AF4), PE11(AF5), PE12(AF5)

init
halt

set GPIOA_BASE 0x58020000
set GPIOC_BASE 0x58020800
set GPIOE_BASE 0x58021000
set GPIOF_BASE 0x58021400

proc memread32 {addr} { array unset _r32; mem2array _r32 32 $addr 1; return $_r32(0) }
proc rmw32 {addr mask val} { set cur [memread32 $addr]; set new [expr {($cur & ~$mask) | ($val & $mask)}]; mww $addr $new }
proc moder_set_output {base pin} { set mask [expr {0x3 << ($pin * 2)}]; set val [expr {0x1 << ($pin * 2)}]; rmw32 [expr {$base + 0x00}] $mask $val }
proc moder_set_af {base pin} { set mask [expr {0x3 << ($pin * 2)}]; set val [expr {0x2 << ($pin * 2)}]; rmw32 [expr {$base + 0x00}] $mask $val }
proc afr_set {base pin af} {
    if {$pin < 8} {
        set reg [expr {$base + 0x20}]
        set shift [expr {$pin * 4}]
    } else {
        set reg [expr {$base + 0x24}]
        set shift [expr {($pin - 8) * 4}]
    }
    set mask [expr {0xf << $shift}]
    set val [expr {($af & 0xf) << $shift}]
    rmw32 $reg $mask $val
}

set RCC 0x580244E0
rmw32 $RCC 0x000007ff 0x000007ff

echo "Phase A: BOOT0 low + NRST pulse"
moder_set_output $GPIOA_BASE 11
rmw32 [expr {$GPIOA_BASE + 0x18}] 0xffffffff [expr {1 << (11 + 16)}]
moder_set_output $GPIOF_BASE 4
rmw32 [expr {$GPIOF_BASE + 0x18}] 0xffffffff [expr {1 << (4 + 16)}]
sleep 250
rmw32 [expr {$GPIOF_BASE + 0x18}] 0xffffffff [expr {1 << 4}]

echo "Phase B: run and continuously inject lane-C AF policy"
resume
for {set i 0} {$i < 100} {incr i} {
    foreach spec {{0x58020800 10 6} {0x58020800 11 6} {0x58020800 12 6} {0x58020800 9 4} {0x58021000 11 5} {0x58021000 12 5}} {
        set base [lindex $spec 0]
        set pin [lindex $spec 1]
        set af  [lindex $spec 2]
        moder_set_af $base $pin
        afr_set $base $pin $af
    }
    if {[expr {$i % 20}] == 0} { echo "  LIVE_AF_INJECT laneC iter=$i" }
    sleep 20
}

shutdown
