# 03_boot0_hunt.cfg
#
# Halted-mode hunt for the real LORA_BOOT0 net on the X8 + Max Carrier.
#
# Strategy: with M7 halted (so x8h7 firmware can't fight us), iterate over
# every output-capable pin in GPIOA..K, set it HIGH (RMW), pulse a known
# NRST candidate (default PC_7), then ask the operator to send 0x7F at 8E1
# via /dev/ttymxc3 in a second shell and report whether 0x79 came back.
#
# This is much faster and more reliable than the gpio167 sysfs sweep because:
#   - We confirm electrically (IDR readback) that the bit went high.
#   - x8h7 firmware is halted, so it can't override our writes.
#   - We don't depend on x8h7_gpio exporting the pin to Linux at all.
#
# Pins to skip (analog-only or definitely not GPIO_OUT-capable on H747):
#   - PA_13/14 (SWDIO/SWCLK) — disconnecting these kills our debug session!
#   - PJ_12/13 (LCD_R) — irrelevant on Max Carrier but no harm
#   - GPIOK is mostly LCD; skip whole bank by default
# Pins NOT to drive HIGH because they'd break the bench:
#   - GPIOG bits 11/13/14 (ETH RMII) — would crash kernel networking
#     (we're SSH'd, so this matters only if you're on Ethernet, but be safe)
#   - GPIOC bits 8..12 (SDMMC1) — would crash filesystem
#   - GPIOA bits 11/12 (USB_OTG_FS) — host adb link
# We blacklist all of these.

set NRST_BANK_BASE 0x58020800   ;# GPIOC
set NRST_PIN       7

# Bank base addresses
array set BANK {
    A 0x58020000
    B 0x58020400
    C 0x58020800
    D 0x58020c00
    E 0x58021000
    F 0x58021400
    G 0x58021800
    H 0x58021c00
    I 0x58022000
    J 0x58022400
}

# Per-bank blacklist of pin numbers we must NOT drive (would brick bench).
array set BLACKLIST {
    A {11 12 13 14}
    B {}
    C {7  8 9 10 11 12}
    D {}
    E {}
    F {}
    G {11 13 14}
    H {}
    I {}
    J {}
}

# Portable 32-bit memory read. Wraps mem2array which all openocd builds carry.
proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}

proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
}

proc enable_all_clocks {} {
    set mask 0x3ff
    rmw32 0x580244E0 $mask $mask
}

proc moder_set_output {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    set val  [expr {0x1 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask $val
}
proc moder_restore_input {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask 0
}
proc bsrr_set   {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }
proc idr_bit {base pin} {
    set idr [memread32 [expr {$base + 0x10}]]
    return [expr {($idr >> $pin) & 1}]
}

proc pulse_nrst {} {
    global NRST_BANK_BASE NRST_PIN
    moder_set_output $NRST_BANK_BASE $NRST_PIN
    bsrr_reset $NRST_BANK_BASE $NRST_PIN
    sleep 60
    bsrr_set $NRST_BANK_BASE $NRST_PIN
    sleep 50
}

enable_all_clocks
echo "Halted-mode BOOT0 hunt starting."
echo "For each candidate, this script will: drive HIGH, pulse NRST, then PAUSE."
echo "While paused, run in a SECOND shell:"
echo "  stty -F /dev/ttymxc3 19200 cs8 parenb -parodd -cstopb raw -echo time 5 min 0"
echo "  ( cat /dev/ttymxc3 > /tmp/r.bin & ) ; sleep 0.2 ; printf '\\x7f' > /dev/ttymxc3 ; sleep 1 ; pkill -f 'cat /dev/ttymxc3'"
echo "  xxd /tmp/r.bin | head -1   # 0x79 in first byte = ROM bootloader = THIS IS THE PIN"
echo ""
echo "Then come back here and press Enter to advance to the next pin (or 'q' Enter to stop)."
echo ""

foreach bank {A B C D E F G H I J} {
    set base $BANK($bank)
    set bl   $BLACKLIST($bank)
    for {set p 0} {$p < 16} {incr p} {
        if {[lsearch -exact $bl $p] >= 0} { continue }
        # Skip the NRST pin itself.
        if {$base == $::NRST_BANK_BASE && $p == $::NRST_PIN} { continue }

        echo "=== Candidate P${bank}_${p} (base=0x[format %08x $base]) ==="
        moder_set_output $base $p
        bsrr_set $base $p
        set actual [idr_bit $base $p]
        echo "  IDR readback = $actual   (need 1 to be a real BOOT0 candidate)"
        if {$actual != 1} {
            echo "  Skipping (pin won't latch high; pulled down externally or not really GPIO_OUT)."
            moder_restore_input $base $p
            continue
        }
        pulse_nrst
        echo "  NRST pulsed. Now run the 0x7F probe in shell 2 and report result."
        echo "  (Enter to continue, q+Enter to abort)"
        set ans [gets stdin]
        bsrr_reset $base $p
        moder_restore_input $base $p
        if {$ans == "q"} { break }
    }
    if {$ans == "q"} { break }
}

echo "Hunt done. Releasing target."
resume
shutdown
