# 05_assert_pd15_pa11.cfg — SWAPPED polarity test.
#
# Try: BOOT0 = PD_15 (LoRa pin 22, PWM5), NRST = PA_11 (LoRa pin 43, PWM4).
# (Inverse of 04_assert_pa11_pd15.cfg.)

set GPIOA_BASE 0x58020000
set GPIOD_BASE 0x58020c00

proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}
proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
}
proc moder_set_output {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    set val  [expr {0x1 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask $val
}
proc bsrr_set   {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }
proc idr_bit {base pin} {
    set idr [memread32 [expr {$base + 0x10}]]
    return [expr {($idr >> $pin) & 1}]
}

echo "Phase A: enable GPIOA + GPIOD clocks"
rmw32 0x580244E0 [expr {(1 << 0) | (1 << 3)}] [expr {(1 << 0) | (1 << 3)}]

echo "Phase B: drive PD_15 HIGH (assumed BOOT0)"
moder_set_output $GPIOD_BASE 15
bsrr_set $GPIOD_BASE 15
echo "  GPIOD_IDR.PD_15 = [idr_bit $GPIOD_BASE 15]   (expect 1)"

echo "Phase C: pulse PA_11 LOW(250ms) then HIGH (assumed NRST)"
moder_set_output $GPIOA_BASE 11
bsrr_reset $GPIOA_BASE 11
echo "  GPIOA_IDR.PA_11 (low)  = [idr_bit $GPIOA_BASE 11]   (expect 0)"
sleep 250
bsrr_set $GPIOA_BASE 11
sleep 200
echo "  GPIOA_IDR.PA_11 (high) = [idr_bit $GPIOA_BASE 11]   (expect 1)"

echo "Phase D: re-assert PD_15 HIGH"
bsrr_set $GPIOD_BASE 15
echo "  GPIOD_IDR.PD_15 (post-reset) = [idr_bit $GPIOD_BASE 15]   (expect 1)"

echo ""
echo "READY: holding halted for 60s with PD_15=HIGH (re-asserted every 1s)."

for {set i 0} {$i < 60} {incr i} {
    sleep 1000
    bsrr_set $GPIOD_BASE 15
}

echo "Releasing target."
resume
shutdown
