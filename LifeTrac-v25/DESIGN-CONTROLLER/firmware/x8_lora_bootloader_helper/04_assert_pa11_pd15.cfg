# 04_assert_pa11_pd15.cfg
#
# Correct LoRa BOOT0/NRST mapping derived from Max Carrier schematic + x8h7
# firmware src/gpio.c GPIO_pinmap[] PWM block:
#   LoRa pin 43 = J2-67 = PWM4 = PA_11  (BOOT0)
#   LoRa pin 22 = J2-69 = PWM5 = PD_15  (NRST)
#
# On X8, PA_11/PA_12 are NOT USB OTG (USB is on the i.MX8 side); they're
# repurposed as PWM channels by the x8h7 firmware. Safe to drive.
#
# Phases:
#   A) Enable GPIOA + GPIOD clocks via RMW.
#   B) PA_11 MODER -> output, BSRR set HIGH, IDR readback (need 1).
#   C) PD_15 MODER -> output, BSRR reset LOW, sleep 60ms, BSRR set HIGH.
#   D) Re-assert PA_11 HIGH (paranoia).
#   E) Hold halted for 60s while operator runs verify_l072_rom.sh.

set GPIOA_BASE 0x58020000
set GPIOD_BASE 0x58020c00

proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}
proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
}
proc moder_set_output {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    set val  [expr {0x1 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask $val
}
proc bsrr_set   {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }
proc idr_bit {base pin} {
    set idr [memread32 [expr {$base + 0x10}]]
    return [expr {($idr >> $pin) & 1}]
}

echo "Phase A: enable GPIOA + GPIOD clocks (bits 0 + 3)"
echo "  RCC_AHB4ENR before = [format 0x%08x [memread32 0x580244E0]]"
rmw32 0x580244E0 [expr {(1 << 0) | (1 << 3)}] [expr {(1 << 0) | (1 << 3)}]
echo "  RCC_AHB4ENR after  = [format 0x%08x [memread32 0x580244E0]]"

echo "Phase B: drive PA_11 HIGH (LoRa BOOT0)"
moder_set_output $GPIOA_BASE 11
bsrr_set $GPIOA_BASE 11
echo "  GPIOA_IDR.PA_11 = [idr_bit $GPIOA_BASE 11]   (expect 1)"

echo "Phase C: pulse PD_15 LOW then HIGH (LoRa NRST)"
moder_set_output $GPIOD_BASE 15
bsrr_reset $GPIOD_BASE 15
echo "  GPIOD_IDR.PD_15 (low pulse)  = [idr_bit $GPIOD_BASE 15]   (expect 0)"
sleep 60
bsrr_set $GPIOD_BASE 15
sleep 100
echo "  GPIOD_IDR.PD_15 (after high) = [idr_bit $GPIOD_BASE 15]   (expect 1)"

echo "Phase D: re-assert PA_11 HIGH"
bsrr_set $GPIOA_BASE 11
echo "  GPIOA_IDR.PA_11 (post-reset) = [idr_bit $GPIOA_BASE 11]   (expect 1)"

echo ""
echo "READY: L072 should now be in STM32 system bootloader on /dev/ttymxc3 at 19200 8E1."
echo "Holding halted for 60 seconds with PA_11=HIGH (re-asserted every 1s)."
echo "Run verify_l072_rom.sh from a second shell during this window."

for {set i 0} {$i < 60} {incr i} {
    sleep 1000
    bsrr_set $GPIOA_BASE 11
}

echo "Releasing target."
resume
shutdown
