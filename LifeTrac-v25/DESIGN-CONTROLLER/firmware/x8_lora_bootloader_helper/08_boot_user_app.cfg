# 08_boot_user_app.cfg
#
# Post-flash boot sequence for Murata CMWX1ZZABZ-078 (STM32L072) on Portenta X8
# Max Carrier. Drops BOOT0 (PA_11) LOW so the L072 boots from user flash, then
# pulses NRST (PF_4) LOW(250ms)/HIGH to reset into the freshly-flashed firmware.
#
# Prereq: H7 M7 must already be halted (run after openocd has attached and the
# 06/07 cfg has been used to enable GPIOA+GPIOF clocks). If running cold, this
# script also re-enables clocks first to be safe.
#
# Pin map (confirmed via x8h7_pinmap):
#   PA_11 = LoRa BOOT0  (RCC AHB4ENR bit 0)
#   PF_4  = LoRa NRST   (RCC AHB4ENR bit 5)
#
# Register addresses (STM32H747XI):
#   RCC_AHB4ENR  = 0x580244E0
#   GPIOA_MODER  = 0x58020000  (PA_11 -> bits 23:22 = 01 = output)
#   GPIOA_BSRR   = 0x58020018  (set bits 0..15, reset bits 16..31)
#   GPIOF_MODER  = 0x58021400  (PF_4  -> bits  9:8  = 01 = output)
#   GPIOF_BSRR   = 0x58021418

init
halt

echo "Phase A: ensure GPIOA + GPIOF clocks enabled"
set rcc_pre [mrw 0x580244E0]
echo "  RCC_AHB4ENR before = $rcc_pre"
mww 0x580244E0 [expr {$rcc_pre | 0x21}]
echo "  RCC_AHB4ENR after  = [mrw 0x580244E0]"

echo "Phase B: ensure PA_11 + PF_4 are outputs (preserve other bits)"
set ma [mrw 0x58020000]
mww 0x58020000 [expr {($ma & ~(0x3 << 22)) | (0x1 << 22)}]
set mf [mrw 0x58021400]
mww 0x58021400 [expr {($mf & ~(0x3 << 8))  | (0x1 << 8)}]

echo "Phase C: drop BOOT0 (PA_11 -> LOW) so L072 boots from flash"
mww 0x58020018 [expr {1 << (11 + 16)}]
echo "  GPIOA_IDR.PA_11 = [expr {([mrw 0x58020010] >> 11) & 1}]   (expect 0)"

echo "Phase D: pulse NRST (PF_4 LOW 250 ms then HIGH)"
mww 0x58021418 [expr {1 << (4 + 16)}]
echo "  GPIOF_IDR.PF_4 (low)  = [expr {([mrw 0x58021410] >> 4) & 1}]   (expect 0)"
sleep 250
mww 0x58021418 [expr {1 << 4}]
echo "  GPIOF_IDR.PF_4 (high) = [expr {([mrw 0x58021410] >> 4) & 1}]   (expect 1)"

echo ""
echo "DONE: BOOT0 LOW, NRST released. L072 should now run user firmware."
echo "Allow ~500 ms then probe UART (e.g. AT command at 19200 8N1)."

shutdown
