# 09_boot_user_app_hold.cfg
#
# Same as 08_boot_user_app.cfg but DOES NOT shutdown -- holds H7 halted with
# PA_11=LOW so the L072 stays booted from user flash while a host-side listener
# captures UART output on /dev/ttymxc3. Caller is expected to kill openocd
# after capture.

init
halt

echo "Phase A: ensure GPIOA + GPIOF clocks enabled"
set rcc_pre [mrw 0x580244E0]
mww 0x580244E0 [expr {$rcc_pre | 0x21}]

echo "Phase B: ensure PA_11 + PF_4 are outputs"
set ma [mrw 0x58020000]
mww 0x58020000 [expr {($ma & ~(0x3 << 22)) | (0x1 << 22)}]
set mf [mrw 0x58021400]
mww 0x58021400 [expr {($mf & ~(0x3 << 8))  | (0x1 << 8)}]

echo "Phase C: drop BOOT0 (PA_11 -> LOW)"
mww 0x58020018 [expr {1 << (11 + 16)}]
echo "  GPIOA_IDR.PA_11 = [expr {([mrw 0x58020010] >> 11) & 1}]   (expect 0)"

echo "Phase D: pulse NRST (PF_4 LOW 250 ms then HIGH)"
mww 0x58021418 [expr {1 << (4 + 16)}]
sleep 250
mww 0x58021418 [expr {1 << 4}]
echo "  GPIOF_IDR.PF_4 (high) = [expr {([mrw 0x58021410] >> 4) & 1}]   (expect 1)"

echo ""
echo "DONE: L072 booted. Holding H7 halted; PA_11=LOW maintained. Listen now."

# Hold loop: keep H7 halted and PA_11 LOW for up to 600s
for {set i 0} {$i < 600} {incr i} {
    mww 0x58020018 [expr {1 << (11 + 16)}]
    sleep 1000
}
