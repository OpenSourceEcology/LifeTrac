# 02b_assert_pg7_pc7_hold60.cfg
#
# Same as 02_assert_pg7_pc7.cfg but holds the H7 halted with PG_7 HIGH for
# 60 seconds without reading stdin. Use when running openocd in the background
# from a script (where stdin is /dev/null and gets stdin returns EOF instantly).
#
# Run the verify_l072_rom.sh probe in a SECOND shell during the 60s window.

set GPIOC_BASE 0x58020800
set GPIOG_BASE 0x58021800

proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}
proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
}
proc moder_set_output {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    set val  [expr {0x1 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask $val
}
proc bsrr_set   {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }
proc idr_bit {base pin} {
    set idr [memread32 [expr {$base + 0x10}]]
    return [expr {($idr >> $pin) & 1}]
}

# Phase A: enable GPIOC + GPIOG clocks (RMW)
rmw32 0x580244E0 [expr {(1 << 2) | (1 << 6)}] [expr {(1 << 2) | (1 << 6)}]

# Phase C: drive PG_7 HIGH (BOOT0)
moder_set_output $GPIOG_BASE 7
bsrr_set $GPIOG_BASE 7
echo "PG_7 IDR = [idr_bit $GPIOG_BASE 7]   (need 1)"

# Phase D: pulse PC_7 (NRST)
moder_set_output $GPIOC_BASE 7
bsrr_reset $GPIOC_BASE 7
sleep 60
bsrr_set $GPIOC_BASE 7
sleep 100

# Phase E: confirm and re-assert
echo "After NRST: PG_7=[idr_bit $GPIOG_BASE 7]  PC_7=[idr_bit $GPIOC_BASE 7]"
bsrr_set $GPIOG_BASE 7

echo "HOLDING_HALTED_WITH_PG7_HIGH for 60 seconds. Run verify_l072_rom.sh now."
# Sleep in 1s chunks, periodically re-asserting PG_7 (cheap insurance).
for {set i 0} {$i < 60} {incr i} {
    sleep 1000
    bsrr_set $GPIOG_BASE 7
}

echo "Releasing target."
resume
shutdown
