# 02_assert_pg7_pc7.cfg
#
# Sourced AFTER /usr/arduino/extra/openocd_script-imx_gpio.cfg.
# Drives the H747's PG_7 high (assumed LORA_BOOT0) and pulses PC_7 low/high
# (assumed LORA_RESET) using read-modify-write so we don't clobber neighbour
# pins (especially PG_11/13/14 ETH RMII and PC_8..12 SDMMC1).
#
# Then reads IDR back to confirm the bits actually went HIGH electrically.
# Finally idles inside a `gets stdin` so the operator can run stm32flash from
# a second SSH session against /dev/ttymxc3 while the H7 stays halted and PG_7
# stays asserted.
#
# Pin-mapping caveat: PG_7=BOOT0 / PC_7=NRST is the PORTENTA_H7_M7 variant
# default. If the X8 + Max Carrier SKU uses different nets, this script will
# correctly drive PG_7 / PC_7 (verified by IDR readback) but the L072 won't
# enter ROM bootloader. In that case run 03_boot0_hunt.cfg.

set RCC_AHB4ENR  0x580244E0
set GPIOC_BASE   0x58020800
set GPIOG_BASE   0x58021800
set MODER_OFF    0x00
set IDR_OFF      0x10
set BSRR_OFF     0x18
set LCKR_OFF     0x1c

# Portable 32-bit memory read. Wraps mem2array which all openocd builds carry.
proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}

proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
    return $new
}

proc moder_set_output {base pin} {
    # Force MODER bits [2*pin +: 2] to 0b01 (general-purpose output).
    set mask [expr {0x3 << ($pin * 2)}]
    set val  [expr {0x1 << ($pin * 2)}]
    set new  [rmw32 [expr {$base + 0x00}] $mask $val]
    return $new
}

proc bsrr_set   {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }

proc idr_bit {base pin} {
    set idr [memread32 [expr {$base + 0x10}]]
    return [expr {($idr >> $pin) & 1}]
}

proc lckr_bit {base pin} {
    set l [memread32 [expr {$base + 0x1c}]]
    return [expr {($l >> $pin) & 1}]
}

# --- Phase A: enable clocks (RMW so we don't drop unrelated peripherals) ---
echo "Phase A: enable GPIOC + GPIOG clocks (RMW)"
set ahb4_before [memread32 0x580244E0]
echo [format "  RCC_AHB4ENR before = 0x%08x" $ahb4_before]
rmw32 0x580244E0 [expr {(1 << 2) | (1 << 6)}] [expr {(1 << 2) | (1 << 6)}]
set ahb4_after [memread32 0x580244E0]
echo [format "  RCC_AHB4ENR after  = 0x%08x" $ahb4_after]

# --- Phase B: pin-lock sanity check ---
echo "Phase B: check LCKR locks"
set pg7_locked [lckr_bit $GPIOG_BASE 7]
set pc7_locked [lckr_bit $GPIOC_BASE 7]
echo "  PG_7 LCKR=$pg7_locked   PC_7 LCKR=$pc7_locked   (should be 0; if 1, only a reset clears the lock)"

# --- Phase C: drive PG_7 HIGH (BOOT0) ---
echo "Phase C: drive PG_7 HIGH"
set moder_g_before [memread32 [expr {$GPIOG_BASE + 0x00}]]
echo [format "  GPIOG_MODER before = 0x%08x" $moder_g_before]
set moder_g_after [moder_set_output $GPIOG_BASE 7]
echo [format "  GPIOG_MODER after  = 0x%08x" $moder_g_after]
bsrr_set $GPIOG_BASE 7
set pg7 [idr_bit $GPIOG_BASE 7]
echo "  GPIOG_IDR.PG_7 = $pg7   (expect 1)"
if {$pg7 != 1} {
    echo "  *** PG_7 did not latch HIGH. Likely external pull-down dominating, or pin not actually GPIO output."
}

# --- Phase D: pulse PC_7 (NRST) ---
echo "Phase D: pulse PC_7 LOW then HIGH (NRST)"
set moder_c_before [memread32 [expr {$GPIOC_BASE + 0x00}]]
echo [format "  GPIOC_MODER before = 0x%08x" $moder_c_before]
set moder_c_after [moder_set_output $GPIOC_BASE 7]
echo [format "  GPIOC_MODER after  = 0x%08x" $moder_c_after]
bsrr_reset $GPIOC_BASE 7
set pc7_lo [idr_bit $GPIOC_BASE 7]
echo "  GPIOC_IDR.PC_7 (low pulse)  = $pc7_lo   (expect 0)"
sleep 60
bsrr_set $GPIOC_BASE 7
set pc7_hi [idr_bit $GPIOC_BASE 7]
echo "  GPIOC_IDR.PC_7 (after high) = $pc7_hi   (expect 1)"

# --- Phase E: re-confirm PG_7 still high after reset pulse ---
sleep 50
set pg7_post [idr_bit $GPIOG_BASE 7]
echo "  GPIOG_IDR.PG_7 (post-reset) = $pg7_post   (expect 1)"

echo "---"
echo "L072 should now be in STM32 system bootloader on /dev/ttymxc3 at 19200 8E1."
echo "From a second shell on the X8, run:"
echo "  /tmp/lifetrac_p0c/verify_l072_rom.sh"
echo "  # then if 0x79 ACK seen, proceed with stm32flash."
echo ""
echo "This openocd session will hold the H7 halted with PG_7=HIGH until you"
echo "press Enter here. DO NOT exit until the L072 flash completes."
echo "(Press Enter to release and shutdown openocd.)"
gets stdin

echo "Releasing target."
resume
shutdown
