# 28_snapshot_user_runtime_route_detail.cfg
#
# Detailed user-runtime route snapshot:
# - Force BOOT0 low + NRST pulse
# - Let H7 runtime execute briefly
# - Halt and dump GPIO mux-related state (MODER/PUPDR/AFR/IDR)

init
halt

set GPIOA_BASE 0x58020000
set GPIOF_BASE 0x58021400

proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}

proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
}

proc moder_set_output {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    set val [expr {0x1 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask $val
}

proc bsrr_set {base pin} { mww [expr {$base + 0x18}] [expr {1 << $pin}] }
proc bsrr_reset {base pin} { mww [expr {$base + 0x18}] [expr {1 << ($pin + 16)}] }

proc dump_gpio_route_detail {} {
    set ahb4 [memread32 0x580244E0]
    echo [format "RCC_AHB4ENR = 0x%08x" $ahb4]

    set names {A B C D E F G H I J K}
    for {set i 0} {$i < 11} {incr i} {
        set base [expr {0x58020000 + ($i * 0x400)}]
        set en [expr {($ahb4 >> $i) & 1}]
        set name [lindex $names $i]
        if {$en == 0} {
            echo [format "GPIO%s @ 0x%08x (clock OFF)" $name $base]
            continue
        }

        set moder [memread32 [expr {$base + 0x00}]]
        set pupdr [memread32 [expr {$base + 0x0C}]]
        set idr [memread32 [expr {$base + 0x10}]]
        set afrl [memread32 [expr {$base + 0x20}]]
        set afrh [memread32 [expr {$base + 0x24}]]

        echo "GPIO$name base=$base MODER=$moder PUPDR=$pupdr AFRL=$afrl AFRH=$afrh IDR=[expr {$idr & 0xffff}]"
    }
}

echo "Phase A: enable all GPIO bank clocks (A..K)"
set RCC 0x580244E0
rmw32 $RCC 0x000007ff 0x000007ff

echo "Phase B: force BOOT0 low (PA_11), pulse NRST (PF_4)"
moder_set_output $GPIOA_BASE 11
bsrr_reset $GPIOA_BASE 11
moder_set_output $GPIOF_BASE 4
bsrr_reset $GPIOF_BASE 4
sleep 250
bsrr_set $GPIOF_BASE 4

echo "Phase C: run target for runtime ownership"
resume
sleep 1200
halt

echo "Phase D: dump detailed user-runtime route state"
dump_gpio_route_detail

shutdown
