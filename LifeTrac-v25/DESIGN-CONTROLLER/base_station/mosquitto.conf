# LifeTrac v25 base-station mosquitto config.
#
# Loopback-only inside the compose network; auth not required because the
# only clients are sibling containers and the docker network already
# isolates them. If/when an off-host client (a tablet running the
# operator console outside docker, say) needs to publish, switch
# `allow_anonymous` to false and add password_file.

listener 1883 0.0.0.0
allow_anonymous true

# Persist retained messages + queued QoS 1/2 so a broker restart does not
# lose the latest source_active / params/changed retained payload.
persistence true
persistence_location /mosquitto/data/

# Bound logging volume so `docker compose logs mosquitto` shows the same
# stream as the on-disk log.
log_dest stdout
log_type error
log_type warning
log_type notice

# v25 telemetry can burst at ~80 msg/s during tile-delta floods; default
# limits are fine but keep them explicit for the audit case.
max_queued_messages 1000
max_inflight_messages 50
