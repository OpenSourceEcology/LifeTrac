<!doctype html>
<!--
  login.html — LifeTrac v25 base-station PIN entry.
  Per DECISIONS.md D-E1: shared 4–6 digit PIN, HttpOnly cookie session,
  30-min idle, 5-fail lockout per IP. Plain HTTP on the LAN; reverse-proxy
  TLS is the operator's responsibility.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LifeTrac v25 — Sign in</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1a1d22; color: #e6e8eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .wrap { height: 100%; display: flex; align-items: center; justify-content: center; }
    .card { background: #232830; padding: 32px 40px; border-radius: 12px;
      width: 320px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    h1 { margin: 0 0 4px; font-size: 18px; }
    p.sub { margin: 0 0 24px; font-size: 13px; opacity: 0.7; }
    label { display: block; font-size: 12px; opacity: 0.7; margin-bottom: 6px; }
    input[type=password] { width: 100%; box-sizing: border-box; padding: 12px;
      font-size: 22px; letter-spacing: 0.4em; text-align: center;
      background: #1a1d22; color: #e6e8eb; border: 1px solid #444; border-radius: 6px; }
    button { margin-top: 16px; width: 100%; padding: 12px; font-size: 15px;
      background: #4caf50; color: #000; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { margin-top: 12px; color: #ff6a6a; font-size: 13px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <form class="card" id="login-form" autocomplete="off">
      <h1>LifeTrac v25</h1>
      <p class="sub">Enter operator PIN</p>
      <label for="pin">PIN</label>
      <input id="pin" name="pin" type="password" inputmode="numeric"
             pattern="[0-9]{4,6}" maxlength="6" autofocus required />
      <button type="submit" id="submit">Sign in</button>
      <div class="err" id="err"></div>
    </form>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('err');
    const btn = document.getElementById('submit');
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      errEl.textContent = '';
      btn.disabled = true;
      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: document.getElementById('pin').value }),
        });
        if (resp.ok) {
          // Server sets HttpOnly session cookie; navigate to operator UI.
          window.location.href = '/';
          return;
        }
        if (resp.status === 429) {
          errEl.textContent = 'Too many failed attempts. Try again later.';
        } else {
          errEl.textContent = 'Incorrect PIN.';
        }
      } catch (e) {
        errEl.textContent = 'Network error.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
