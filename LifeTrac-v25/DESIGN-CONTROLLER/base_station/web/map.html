<!doctype html>
<!--
  map.html — LifeTrac v25 GPS map view.

  Live GPS marker fed from /ws/state (state.gps), tile rendering via
  Leaflet with an offline tile fallback (file:///opt/lifetrac/tiles/{z}/{x}/{y}.png
  on the base-station SBC). When the SBC has internet, OpenStreetMap is
  used; otherwise the offline directory takes over with no UI prompt.

  Range estimate sidebar is computed client-side from the last RSSI/SNR
  reported in state.link.rssi_dbm + the antenna model in IMAGE_PIPELINE.md
  Appendix B (free-space path loss + 6 dB tractor loss + 3 dB rain margin).
  This is a coarse readout — the operator should still consult the
  diagnostics page for the authoritative airtime / SF rung.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LifeTrac v25 — Map</title>

  <!--
    Leaflet 1.9.4 SRI hashes. The base-station nginx serves these from
    /static/vendor/leaflet/ when offline; the CDN <script> tags are
    intentionally absent so this page works on an air-gapped SBC.
  -->
  <link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css" />
  <style>
    :root { --bg:#1a1d22; --fg:#e6e8eb; --panel:#232830; --warn:#ff7a00;
            --danger:#d62828; --ok:#4caf50; }
    html, body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    header { display:flex; justify-content:space-between; align-items:center;
      padding: 8px 16px; background: var(--panel); border-bottom: 1px solid #333; }
    header .title { font-weight:600; }
    header .nav a { color: var(--fg); text-decoration:none; margin-left:12px; opacity:.8; }
    header .nav a:hover { opacity:1; }
    main { display:grid; grid-template-columns: 1fr 280px; gap:0;
      height: calc(100% - 50px); }
    #map { height: 100%; background: #0d0e10; }
    aside { background: var(--panel); padding: 12px; display:flex;
      flex-direction: column; gap: 6px; border-left: 1px solid #333;
      font-family: ui-monospace, monospace; font-size: 13px; }
    aside h3 { margin: 0 0 4px 0; font-size: 12px; opacity:.7; text-transform:uppercase; }
    .row { display:flex; justify-content: space-between; }
    .stale { color: var(--warn); }
    .nofix { color: var(--danger); }
    .ok { color: var(--ok); }
    .pill { display:inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 11px; background:#444; }
    .pill.ok { background: var(--ok); color:#000; }
    .pill.warn { background: var(--warn); color:#000; }
    .pill.bad { background: var(--danger); color:#fff; }
  </style>
</head>
<body>
  <header>
    <div class="title">LifeTrac v25 — Map</div>
    <div class="nav">
      <a href="/">Console</a>
      <a href="/diagnostics">Diagnostics</a>
      <a href="/audit">Audit</a>
      <a href="/settings">Settings</a>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <aside>
      <h3>GPS</h3>
      <div class="row"><span>fix</span><span id="gps-fix" class="nofix">no fix</span></div>
      <div class="row"><span>lat</span><span id="gps-lat">—</span></div>
      <div class="row"><span>lon</span><span id="gps-lon">—</span></div>
      <div class="row"><span>HDOP</span><span id="gps-hdop">—</span></div>
      <div class="row"><span>sats</span><span id="gps-sats">—</span></div>
      <div class="row"><span>speed</span><span id="gps-speed">—</span></div>
      <div class="row"><span>age</span><span id="gps-age">—</span></div>
      <h3>Link</h3>
      <div class="row"><span>RSSI</span><span id="link-rssi">—</span></div>
      <div class="row"><span>SNR</span><span id="link-snr">—</span></div>
      <div class="row"><span>est. range</span><span id="link-range">—</span></div>
      <div class="row"><span>encode</span><span id="link-mode" class="pill">—</span></div>
    </aside>
  </main>

  <script src="/static/vendor/leaflet/leaflet.js"></script>
  <script src="/static/map.js"></script>
</body>
</html>
