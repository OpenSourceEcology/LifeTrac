# LifeTrac v25 base-station compose stack.
#
# Brings up: mosquitto broker, lora_bridge (talks to the SX1276 over USB-CDC),
# web_ui (operator console + REST), audit-tail (rotating JSONL writer).
#
# All four services share the same image (built from ./Dockerfile) and the
# same /var/lib/lifetrac volume so audit logs and settings survive restarts.
# Mosquitto is on the default 1883 inside the compose network so containers
# can talk to it as `mqtt://mosquitto:1883` without exposing it to the LAN.
#
# Run with:
#     docker compose up -d
# Tail a service:
#     docker compose logs -f web_ui
# Bring down (preserving volumes):
#     docker compose down

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./base_station/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    # Bound to localhost only; reverse-proxy TLS or a firewall handles LAN
    # exposure. Compose-internal traffic uses the service-name DNS alias.
    ports:
      - "127.0.0.1:1883:1883"

  lora_bridge:
    build: .
    image: lifetrac-v25:latest
    restart: unless-stopped
    depends_on:
      - mosquitto
    # Bridge needs the SX1276 USB-CDC; map the host device through. The
    # path is overridable via .env so dev boxes can swap in a virtual
    # serial port for tests.
    devices:
      - "${LIFETRAC_LORA_DEVICE:-/dev/ttyACM0}:/dev/ttyACM0"
    environment:
      LIFETRAC_MQTT_HOST: mosquitto
      LIFETRAC_LORA_DEVICE: /dev/ttyACM0
      LIFETRAC_FLEET_KEY_FILE: /run/secrets/lifetrac_fleet_key
      LIFETRAC_NONCE_STORE: /var/lib/lifetrac/nonce_store.json
    volumes:
      - lifetrac_state:/var/lib/lifetrac
      - lifetrac_logs:/var/log/lifetrac
    secrets:
      - lifetrac_fleet_key
    # Bridge takes the LoRa device as its single positional arg; the env var
    # is the only source of truth so .env / compose stay in sync (IP-002).
    command: ["sh", "-c", "exec python /app/base_station/lora_bridge.py \"$LIFETRAC_LORA_DEVICE\" --mqtt \"$LIFETRAC_MQTT_HOST\""]

  web_ui:
    build: .
    image: lifetrac-v25:latest
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      LIFETRAC_MQTT_HOST: mosquitto
      LIFETRAC_PIN_FILE: /run/secrets/lifetrac_pin
      LIFETRAC_PIN: "${LIFETRAC_PIN:-}"
      LIFETRAC_SETTINGS_PATH: /var/lib/lifetrac/settings.json
      LIFETRAC_TRUSTED_PROXIES: "${LIFETRAC_TRUSTED_PROXIES:-}"
    volumes:
      - lifetrac_state:/var/lib/lifetrac
      - lifetrac_logs:/var/log/lifetrac
    ports:
      - "8080:8080"
    secrets:
      - lifetrac_pin
    command: ["uvicorn", "web_ui:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers"]

  audit_tail:
    build: .
    image: lifetrac-v25:latest
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      LIFETRAC_MQTT_HOST: mosquitto
      LIFETRAC_AUDIT_PATH: /var/log/lifetrac/audit.jsonl
    volumes:
      - lifetrac_logs:/var/log/lifetrac
    command: ["python", "-m", "audit_log", "--tail-mqtt"]

volumes:
  mosquitto_data:
  mosquitto_logs:
  lifetrac_state:
  lifetrac_logs:

# Docker secrets — populate ./secrets/{lifetrac_pin,lifetrac_fleet_key} on the
# base station before `docker compose up`. Files are mounted read-only at
# /run/secrets/* and consumed via the *_FILE env vars above (IP-002, IP-008).
secrets:
  lifetrac_pin:
    file: ./secrets/lifetrac_pin
  lifetrac_fleet_key:
    file: ./secrets/lifetrac_fleet_key
