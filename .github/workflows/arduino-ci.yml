name: LifeTrac v25 Controller CI

on:
  push:
    paths:
      - 'LifeTrac-v25/DESIGN-CONTROLLER/firmware/**'
      - 'LifeTrac-v25/DESIGN-CONTROLLER/base_station/**'
      - 'LifeTrac-v25/DESIGN-CONTROLLER/tools/**'
      - 'LifeTrac-v25/DESIGN-CONTROLLER/arduino_libraries.txt'
      - 'LifeTrac-v25/DESIGN-CONTROLLER/ARDUINO_CI.md'
      - '.github/workflows/arduino-ci.yml'
  pull_request:
    paths:
      - 'LifeTrac-v25/DESIGN-CONTROLLER/firmware/**'
      - 'LifeTrac-v25/DESIGN-CONTROLLER/base_station/**'
      - 'LifeTrac-v25/DESIGN-CONTROLLER/tools/**'
      - 'LifeTrac-v25/DESIGN-CONTROLLER/arduino_libraries.txt'
      - 'LifeTrac-v25/DESIGN-CONTROLLER/ARDUINO_CI.md'
      - '.github/workflows/arduino-ci.yml'
  workflow_dispatch:

jobs:
  python-protocol-tests:
    runs-on: ubuntu-latest
    name: Base station protocol tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unittest protocol gate
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/base_station
        run: python -m unittest discover -s tests

  firmware-compile-plan:
    runs-on: ubuntu-latest
    name: Firmware compile gate status
    steps:
      - name: Print active Arduino targets
        run: |
          echo "Active targets are documented in LifeTrac-v25/DESIGN-CONTROLLER/ARDUINO_CI.md"
          echo "Archived arduino_opta_controller and esp32_remote_control are intentionally not compiled."
          echo "Enable blocking Arduino compile jobs after local FQBN/build-glue verification."

  firmware-l072-static-checks:
    runs-on: ubuntu-24.04
    name: L072 firmware static checks
    steps:
      - uses: actions/checkout@v4
      - name: Install host toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: make check (memory map invariants)
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make check
      - name: make check-opmode-owner
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make check-opmode-owner
      - name: make check-cfg-wire-owner
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make check-cfg-wire-owner
      - name: make check-rx-counter-owner
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make check-rx-counter-owner
      - name: make check-tx-counter-owner
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make check-tx-counter-owner
      - name: make check-lbt-owner
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make check-lbt-owner
      - name: make check-airtime-counter-owner
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make check-airtime-counter-owner
      - name: make check-cfg-contract
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make check-cfg-contract

  firmware-l072-cross-compile:
    runs-on: ubuntu-24.04
    name: L072 cross-compile (arm-none-eabi-gcc)
    needs: firmware-l072-static-checks
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi python3
          arm-none-eabi-gcc --version
      - name: make all
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: make all
      - name: Verify region budgets
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072
        run: |
          arm-none-eabi-size -A -d build/firmware.elf | tee build/size.txt
          python3 tools/check_size_budget.py build/firmware.elf
      - name: Upload L072 firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: l072-firmware-${{ github.sha }}
          path: |
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072/build/firmware.elf
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072/build/firmware.bin
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072/build/firmware.hex
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072/build/firmware.map
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/murata_l072/build/size.txt
          retention-days: 30

  h7-host-driver-tests:
    runs-on: ubuntu-24.04
    name: H7 host driver wire tests
    needs: firmware-l072-cross-compile
    steps:
      - uses: actions/checkout@v4
      - name: Verify murata_host wire constant sync
        run: python3 LifeTrac-v25/DESIGN-CONTROLLER/tools/check_mh_wire_sync.py
      - name: Build and run COBS/CRC unit test
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7
        run: |
          mkdir -p build
          cc -std=gnu11 -Wall -Wextra -Werror -Imurata_host \
            bench/h7_host_proto/mh_cobs_crc_unit.c \
            murata_host/mh_cobs.c \
            murata_host/mh_crc16.c \
            -o build/mh_cobs_crc_unit
          ./build/mh_cobs_crc_unit
      - name: Build and run STATS compatibility vectors
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7
        run: |
          mkdir -p build
          cc -std=gnu11 -Wall -Wextra -Werror -Imurata_host \
            bench/h7_host_proto/mh_stats_vectors.c \
            murata_host/mh_crc16.c \
            murata_host/murata_host.c \
            murata_host/mh_stats.c \
            -o build/mh_stats_vectors
          ./build/mh_stats_vectors

  h7-host-driver-loopback:
    runs-on: ubuntu-24.04
    name: H7 host driver PTY loopback
    needs: h7-host-driver-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build loopback driver
        working-directory: LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7
        run: |
          mkdir -p build
          cc -std=gnu11 -D_DEFAULT_SOURCE -D_POSIX_C_SOURCE=200809L -Wall -Wextra -Werror -Wpedantic -Imurata_host \
            bench/h7_host_proto/loopback_driver.c \
            murata_host/mh_cobs.c \
            murata_host/mh_crc16.c \
            murata_host/murata_host.c \
            murata_host/mh_stats.c \
            murata_host/mh_uart.c \
            murata_host/mh_uart_posix.c \
            murata_host/mh_uart_tcp.c \
            murata_host/mh_stream.c \
            -o build/loopback_driver
      - name: Run PTY loopback harness
        run: |
          python3 LifeTrac-v25/DESIGN-CONTROLLER/tools/murata_host_loopback.py \
            --driver LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7/build/loopback_driver \
            --iterations 150

  # Round 15 (2026-04-28): handheld_mkr is now a blocking compile gate.
  # The earlier ``continue-on-error: true`` masked three independent bugs that
  # all had to be fixed before this job could go green:
  #   1. The .ino used ``#include "../common/lora_proto/lora_proto.h"`` which
  #      doesn't resolve in arduino-cli's temp build dir. Now staged to
  #      ``src/lora_proto/`` and the include is ``"src/lora_proto/lora_proto.h"``.
  #   2. ``--build-property build.extra_flags=...`` *replaces* the board's own
  #      ``build.extra_flags`` (which include ``-DUSE_BQ24195L_PMIC`` — that
  #      gate guards the ``LORA_IRQ`` pin define for MKR WAN 1310). We now use
  #      ``compiler.cpp.extra_flags`` / ``compiler.c.extra_flags`` which *add*
  #      to the existing flags instead of clobbering them.
  #   3. ``crypto_stub.c`` requires an opt-in ``LIFETRAC_ALLOW_STUB_CRYPTO``
  #      define for the stub build to acknowledge it isn't field-safe.
  firmware-compile-handheld:
    runs-on: ubuntu-latest
    name: Compile firmware/handheld_mkr
    steps:
      - uses: actions/checkout@v4
      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s -- -b /usr/local/bin
          arduino-cli version
      - name: Install cores
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:samd
      - name: Install libraries
        run: |
          arduino-cli lib install RadioLib
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install Crypto
      - name: Stage shared lora_proto sources into sketch
        run: |
          mkdir -p LifeTrac-v25/DESIGN-CONTROLLER/firmware/handheld_mkr/src
          cp -r LifeTrac-v25/DESIGN-CONTROLLER/firmware/common/lora_proto \
                LifeTrac-v25/DESIGN-CONTROLLER/firmware/handheld_mkr/src/
      - name: Compile (stub crypto)
        run: |
          arduino-cli compile --fqbn arduino:samd:mkrwan1310 \
            --build-property "compiler.cpp.extra_flags=-DLIFETRAC_ALLOW_UNCONFIGURED_KEY -DLIFETRAC_ALLOW_STUB_CRYPTO" \
            --build-property "compiler.c.extra_flags=-DLIFETRAC_ALLOW_UNCONFIGURED_KEY -DLIFETRAC_ALLOW_STUB_CRYPTO" \
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/handheld_mkr
      - name: Compile (real crypto)
        run: |
          arduino-cli compile --fqbn arduino:samd:mkrwan1310 \
            --build-property "compiler.cpp.extra_flags=-DLIFETRAC_USE_REAL_CRYPTO -DLIFETRAC_ALLOW_UNCONFIGURED_KEY" \
            --build-property "compiler.c.extra_flags=-DLIFETRAC_USE_REAL_CRYPTO -DLIFETRAC_ALLOW_UNCONFIGURED_KEY" \
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/handheld_mkr

  # Round 16 (2026-04-28): now a blocking compile gate. The two issues
  # exposed by the local arduino-cli replay were:
  #   1. .ino filename did not match the folder name (was
  #      ``opta_modbus_slave.ino`` in folder ``tractor_opta/``); arduino-cli
  #      requires them to match. Renamed to ``tractor_opta.ino``.
  #   2. ``#include <OptaBlue.h>`` requires the ``Arduino_Opta_Blueprint``
  #      library, which was missing from the install step.
  firmware-compile-opta:
    runs-on: ubuntu-latest
    name: Compile firmware/tractor_opta
    steps:
      - uses: actions/checkout@v4
      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s -- -b /usr/local/bin
      - name: Install cores
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:mbed_opta
      - name: Install libraries
        run: |
          arduino-cli lib install ArduinoRS485
          arduino-cli lib install ArduinoModbus
          arduino-cli lib install Arduino_Opta_Blueprint
      - name: Compile
        run: |
          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_opta

  # Round 17 (2026-04-28): tractor_h7 is now a blocking compile gate, and
  # the M4 watchdog firmware was split out into its own sketch folder
  # (``firmware/tractor_h7_m4/``) built by the parallel
  # ``firmware-compile-tractor-m4`` job below. Why the split:
  #   * arduino-cli compiles every .cpp in a sketch folder into the
  #     selected core's binary, so leaving ``tractor_m4.cpp`` next to
  #     ``tractor_h7.ino`` produced ``multiple definition of 'setup'`` at
  #     link time when targeting M7.
  #   * A ``#if defined(CORE_CM4)`` guard inside the .cpp would have fixed
  #     the link error but did NOT fix the M4 build: arduino-cli's library
  #     auto-discovery scans the .ino's #include directives regardless of
  #     ``target_core``, so RadioLib + ArduinoModbus + ArduinoRS485 get
  #     pulled into the M4 build and fail to compile against the M4
  #     variant headers. Two separate sketch folders is the canonical
  #     Portenta-dual-core layout (matches Arduino IDE's stock
  #     ``PortentaDualCore`` example).
  firmware-compile-tractor-h7:
    runs-on: ubuntu-latest
    name: Compile firmware/tractor_h7 (M7 core)
    steps:
      - uses: actions/checkout@v4
      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s -- -b /usr/local/bin
      - name: Install cores
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:mbed_portenta
      - name: Install libraries
        run: |
          arduino-cli lib install RadioLib
          arduino-cli lib install ArduinoRS485
          arduino-cli lib install ArduinoModbus
      - name: Stage shared sources into sketch
        run: |
          mkdir -p LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7/src
          cp -r LifeTrac-v25/DESIGN-CONTROLLER/firmware/common/lora_proto \
                LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7/src/
          cp LifeTrac-v25/DESIGN-CONTROLLER/firmware/common/shared_mem.h \
             LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7/src/
      - name: Compile (stub crypto)
        run: |
          arduino-cli compile --fqbn arduino:mbed_portenta:envie_m7 \
            --build-property "compiler.cpp.extra_flags=-DLIFETRAC_ALLOW_UNCONFIGURED_KEY -DLIFETRAC_ALLOW_STUB_CRYPTO" \
            --build-property "compiler.c.extra_flags=-DLIFETRAC_ALLOW_UNCONFIGURED_KEY -DLIFETRAC_ALLOW_STUB_CRYPTO" \
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7

  tractor-h7-method-g-guards:
    runs-on: ubuntu-latest
    name: tractor_h7 Method G runtime guards
    steps:
      - uses: actions/checkout@v4
      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s -- -b /usr/local/bin
      - name: Install cores
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:mbed_portenta
      - name: Install libraries
        run: |
          arduino-cli lib install RadioLib
          arduino-cli lib install ArduinoRS485
          arduino-cli lib install ArduinoModbus
      - name: Stage shared sources into sketch
        run: |
          mkdir -p LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7/src
          cp -r LifeTrac-v25/DESIGN-CONTROLLER/firmware/common/lora_proto \
                LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7/src/
          cp LifeTrac-v25/DESIGN-CONTROLLER/firmware/common/shared_mem.h \
             LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7/src/
      - name: Compile default path (Method G disabled)
        run: |
          arduino-cli compile --fqbn arduino:mbed_portenta:envie_m7 \
            --build-path /tmp/tractor_h7_off \
            --build-property "compiler.cpp.extra_flags=-DLIFETRAC_ALLOW_UNCONFIGURED_KEY -DLIFETRAC_ALLOW_STUB_CRYPTO" \
            --build-property "compiler.c.extra_flags=-DLIFETRAC_ALLOW_UNCONFIGURED_KEY -DLIFETRAC_ALLOW_STUB_CRYPTO" \
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7
      - name: check-mh-runtime-off-symbols
        run: |
          ELF_OFF=/tmp/tractor_h7_off/tractor_h7.ino.elf
          nm --defined-only "$ELF_OFF" > /tmp/tractor_h7_off/nm_off.txt
          if grep -E "mh_runtime_|mh_uart_arduino_" /tmp/tractor_h7_off/nm_off.txt; then
            echo "Method G runtime symbols leaked into default build"
            exit 1
          fi
      - name: Compile Method G host path
        run: |
          arduino-cli compile --fqbn arduino:mbed_portenta:envie_m7 \
            --build-path /tmp/tractor_h7_methodg \
            --build-property "compiler.cpp.extra_flags=-DLIFETRAC_ALLOW_UNCONFIGURED_KEY -DLIFETRAC_ALLOW_STUB_CRYPTO -DLIFETRAC_USE_METHOD_G_HOST=1 -DLIFETRAC_MH_SERIAL=Serial1" \
            --build-property "compiler.c.extra_flags=-DLIFETRAC_ALLOW_UNCONFIGURED_KEY -DLIFETRAC_ALLOW_STUB_CRYPTO -DLIFETRAC_USE_METHOD_G_HOST=1 -DLIFETRAC_MH_SERIAL=Serial1" \
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7
      - name: Verify Method G runtime symbols exist
        run: |
          ELF_ON=/tmp/tractor_h7_methodg/tractor_h7.ino.elf
          if ! nm --defined-only "$ELF_ON" | grep -E "mh_runtime_begin|mh_uart_arduino_init"; then
            echo "Method G runtime symbols missing from enabled build"
            exit 1
          fi

  # Round 17 (2026-04-28): M4 watchdog co-processor build. FQBN uses the
  # ``target_core=cm4`` board menu option (the Portenta core does not
  # expose a separate ``envie_m4`` FQBN — it switches variants via this
  # menu). The M4 binary is uploaded with the IDE's "M4 Co-processor"
  # board target; on hardware the M7 image's bootloader copies it into
  # SRAM at the ``CM4_BINARY_START`` address chosen by the partition
  # menu. See ``firmware/tractor_h7_m4/tractor_h7_m4.ino`` header comment.
  firmware-compile-tractor-m4:
    runs-on: ubuntu-latest
    name: Compile firmware/tractor_h7_m4 (M4 core)
    steps:
      - uses: actions/checkout@v4
      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s -- -b /usr/local/bin
      - name: Install cores
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:mbed_portenta
      - name: Stage shared sources into sketch
        run: |
          mkdir -p LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7_m4/src
          cp LifeTrac-v25/DESIGN-CONTROLLER/firmware/common/shared_mem.h \
             LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7_m4/src/
      - name: Compile
        run: |
          arduino-cli compile --fqbn "arduino:mbed_portenta:envie_m7:target_core=cm4" \
            LifeTrac-v25/DESIGN-CONTROLLER/firmware/tractor_h7_m4