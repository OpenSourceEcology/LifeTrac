set GPIOA_BASE 0x58020000

proc memread32 {addr} {
    array unset _r32
    mem2array _r32 32 $addr 1
    return $_r32(0)
}

proc rmw32 {addr mask val} {
    set cur [memread32 $addr]
    set new [expr {($cur & ~$mask) | ($val & $mask)}]
    mww $addr $new
}

proc moder_set_output {base pin} {
    set mask [expr {0x3 << ($pin * 2)}]
    set val [expr {0x1 << ($pin * 2)}]
    rmw32 [expr {$base + 0x00}] $mask $val
}

proc bsrr_set {base pin} {
    mww [expr {$base + 0x18}] [expr {1 << $pin}]
}

set RCC 0x580244E0
rmw32 $RCC 0x00000001 0x00000001
moder_set_output $GPIOA_BASE 11
bsrr_set $GPIOA_BASE 11

set idr [memread32 [expr {$GPIOA_BASE + 0x10}]]
echo [format "PA11 forced HIGH, GPIOA_IDR=0x%08x" $idr]
shutdown
